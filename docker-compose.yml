version: '3.8'

services:
  simplou:
    build: .
    env_file:
      - .env
    container_name: simplou
    restart: always  # Reinicia automaticamente se parar
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379
    volumes:
      # Persistir dados de autenticação do WhatsApp
      - ./auth:/app/auth
      # Persistir logs (opcional)
      - ./logs:/app/logs
    networks:
      - simplou-network
    # Configurações de saúde e recursos
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Limites de recursos (opcional)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      - postgres
      - redis

  # PostgreSQL (opcional - se quiser rodar localmente)
  postgres:
    image: postgres:15-alpine
    container_name: simplou-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - simplou-network
  redis:
    image: redis:latest
    container_name: simplou-redis
    restart: always
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - simplou-network


volumes:
  postgres_data:
  # redis_data:

networks:
  simplou-network:
    driver: bridge 