      # Persistir dados de autenticação do WhatsApp
      - ./auth:/app/auth
      # Persistir logs (opcional)
      - ./logs:/app/logs
    networks:
      - financebot-network
    # Configurações de saúde e recursos
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Limites de recursos (opcional)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      - postgres

  # PostgreSQL (opcional - se quiser rodar localmente)
  postgres:
    image: postgres:15-alpine
    container_name: financebot-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - financebot-network

