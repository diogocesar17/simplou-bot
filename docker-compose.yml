version: '3.8'

services:
  simplou:
    build: .
    env_file:
      .env
    container_name: simplou
    restart: always  # Reinicia automaticamente se parar
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_URL: ${REDIS_URL}
      TZ: America/Sao_Paulo

     
    volumes:
      # Persistir dados de autenticação do WhatsApp
      - ./auth:/app/auth
      # Persistir logs (opcional)
      - ./logs:/app/logs
    networks:
      - simplou-network
    # Configurações de saúde e recursos
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Limites de recursos (opcional)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      - postgres
      - redis

  # PostgreSQL (opcional - se quiser rodar localmente)
  postgres:
    image: postgres:15-alpine
    container_name: simplou-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=America/Sao_Paulo
      - PGTZ=America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    ports:
      - "5432:5432"
    networks:
      - simplou-network
  redis:
    image: redis:latest
    container_name: simplou-redis
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - simplou-network



volumes:
  postgres_data:
  # redis_data:

networks:
  simplou-network:
    driver: bridge 