services:
  - type: web
    name: financebot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /
    
  - type: redis
    name: financebot-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    
  - type: pserv
    name: financebot-postgres
    env: postgresql
    plan: free
    ipAllowList: [] 